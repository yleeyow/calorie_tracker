<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calories">
<title>Calories</title>
<style>
:root{
  --ink:#16130f;
  --paper:#faf7f0;
  --rule:#d9d2c4;
  --muted:#8b8375;
  --under:#5b8fa8;
  --on:#4a7c59;
  --over:#b5533c;
  --none:#eae5da;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
@media (prefers-color-scheme:dark){
  :root{
    --ink:#f0ece4;--paper:#141310;--rule:#332f28;--muted:#7d7669;
    --none:#201e19;--under:#3f6d84;--on:#3d6a4a;--over:#94422f;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--paper);color:var(--ink);
  font:16px/1.4 ui-rounded,-apple-system,system-ui,sans-serif;
  padding:var(--safe-top) 0 var(--safe-bot);
  overscroll-behavior:none;
}
.wrap{max-width:460px;margin:0 auto;padding:14px 14px 40px}

/* header */
header{display:flex;justify-content:flex-end;gap:20px;margin:6px 0 16px}
.tool{
  background:none;border:0;color:var(--muted);cursor:pointer;padding:4px 0;
  font:500 11px/1 ui-rounded,sans-serif;letter-spacing:.16em;text-transform:uppercase;
}
.tool:active{color:var(--ink)}

/* month nav */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnav button{background:none;border:0;color:var(--ink);font-size:22px;line-height:1;padding:6px 14px;cursor:pointer}
.mnav b{font:500 17px/1 ui-rounded,sans-serif;letter-spacing:.02em}

/* calendar */
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.dow span{text-align:center;font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cell{
  position:relative;aspect-ratio:1;border-radius:10px;background:var(--none);
  border:0;padding:0;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  font:500 14px/1 ui-rounded,sans-serif;
  transition:transform .08s;
}
.cell:active{transform:scale(.94)}
.cell.blank{background:none;pointer-events:none}
.cell.today{box-shadow:inset 0 0 0 2px var(--ink)}
.cell.filled{color:#fff}
.cell .marks{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:8px;letter-spacing:1px;line-height:1}
.cell .note{position:absolute;top:4px;right:5px;width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.55}

/* legend */
.legend{display:flex;gap:14px;justify-content:center;margin-top:16px;font-size:11px;color:var(--muted)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:-1px}

/* summary */
.summary{margin-top:22px;padding-top:16px;border-top:1px solid var(--rule);font-size:12px;color:var(--muted);text-align:center;letter-spacing:.03em}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:5}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:6;
  background:var(--paper);border-radius:20px 20px 0 0;
  padding:20px 18px calc(20px + var(--safe-bot));
  transform:translateY(102%);transition:transform .26s cubic-bezier(.3,1,.4,1);
  max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  box-shadow:0 -8px 40px rgba(0,0,0,.25);
}
.sheet.open{transform:none}
.sheet .grab{
  margin:-20px -18px 8px;padding:18px 0 10px;
  cursor:grab;touch-action:none;
}
.sheet .grab:active{cursor:grabbing}
.sheet .bar{width:36px;height:5px;border-radius:3px;background:var(--rule);margin:0 auto;
  transition:background .15s,width .15s}
.sheet .grab:active .bar{background:var(--muted);width:44px}
.sheet.dragging{transition:none}
.scrim.dragging{transition:none}
.sheet h2{font:500 19px/1 ui-rounded,sans-serif;margin:0 0 2px}
.sheet .sub{font-size:12px;color:var(--muted);margin-bottom:20px;letter-spacing:.03em}

/* fields */
.row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--rule)}
.row label{flex:1;font-size:14px}
.row .unit{font-size:12px;color:var(--muted);width:26px;text-align:right}
input[type=number],input[type=text]{
  width:78px;text-align:right;background:none;border:0;border-radius:0;
  color:var(--ink);font:500 17px/1 ui-rounded,sans-serif;padding:4px 0;
  -moz-appearance:textfield;
}
input::-webkit-inner-spin-button{display:none}
input:focus{outline:none;color:var(--under)}
.denom{font-size:12px;color:var(--muted);min-width:52px;text-align:left}

/* macro toggle */
.disc{width:100%;background:none;border:0;color:var(--muted);font:400 12px/1 ui-rounded,sans-serif;
  letter-spacing:.1em;text-transform:uppercase;padding:14px 0;cursor:pointer;text-align:left}
.macros{display:none}
.macros.show{display:block}

/* backup */
.backup{display:flex;gap:10px;margin-top:10px}
.ghost{flex:1;background:none;color:var(--ink);border:1.5px solid var(--rule)}
.ghost:active{background:var(--none)}
.bhint{margin-top:12px;font-size:12px;line-height:1.5;color:var(--muted);text-align:center}
.bhint.ok{color:var(--on)}
.bhint.err{color:var(--over)}

/* water stepper */
.row.water input{width:44px;text-align:center}
.step{
  width:34px;height:34px;flex:none;border-radius:9px;
  border:1.5px solid var(--rule);background:none;color:var(--ink);
  font:400 19px/1 ui-rounded,sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.step:active{background:var(--ink);color:var(--paper)}

/* meals on the day sheet */
.mealbar{padding-top:14px}
#mealChips{display:flex;flex-wrap:wrap;gap:6px}
#mealChips:not(:empty){margin-bottom:10px}
.mchip{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 10px;border-radius:9px;border:1px solid var(--rule);
  background:none;color:var(--ink);font:400 13px/1 ui-rounded,sans-serif;cursor:pointer;
}
.mchip b{font-weight:500;color:var(--muted);font-size:12px}
.mchip span{color:var(--muted);font-size:15px;line-height:1}
.mchip:active{background:var(--none)}
.addmeal{
  width:100%;padding:12px;border-radius:11px;border:1.5px dashed var(--rule);
  background:none;color:var(--muted);font:500 13px/1 ui-rounded,sans-serif;cursor:pointer;
}
.addmeal:active{border-style:solid}

/* meal index */
#mealSheet{z-index:7}
.mhead{display:flex;align-items:baseline;justify-content:space-between}
.mdone{background:none;border:0;color:var(--under);font:500 15px/1 ui-rounded,sans-serif;padding:4px 0;cursor:pointer}
.mrow{display:flex;align-items:stretch;gap:6px;border-bottom:1px solid var(--rule)}
.madd{
  flex:1;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:none;border:0;padding:14px 0;color:var(--ink);cursor:pointer;text-align:left;
}
.madd:active{opacity:.5}
.madd.static{cursor:default}
.madd.static:active{opacity:1}
.mn{font:400 15px/1.2 ui-rounded,sans-serif}
.mk{font:400 12px/1 ui-rounded,sans-serif;color:var(--muted);white-space:nowrap}
.mdel{background:none;border:0;color:var(--muted);font-size:19px;padding:0 4px 0 12px;cursor:pointer}
.empty{padding:22px 0;text-align:center;font-size:13px;color:var(--muted);border-bottom:1px solid var(--rule)}
.newlabel{font:400 11px/1 ui-rounded,sans-serif;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin:24px 0 2px}
#mName{width:100%;text-align:left;font:500 16px/1 ui-rounded,sans-serif;padding:12px 0}

/* exercise */
.exgroup{display:flex;gap:8px;margin:16px 0 4px}
.chip{
  flex:1;padding:13px 0;border-radius:11px;border:1.5px solid var(--rule);
  background:none;color:var(--muted);font:500 13px/1 ui-rounded,sans-serif;cursor:pointer;
  transition:.12s;
}
.chip.on{border-color:var(--ink);background:var(--ink);color:var(--paper)}

textarea{
  width:100%;margin-top:14px;min-height:76px;background:none;border:1px solid var(--rule);
  border-radius:11px;padding:11px;color:var(--ink);font:400 14px/1.5 ui-rounded,sans-serif;resize:none;
}
textarea:focus{outline:none;border-color:var(--muted)}

.acts{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:15px;border-radius:12px;border:0;font:600 15px/1 ui-rounded,sans-serif;cursor:pointer}
.save{background:var(--ink);color:var(--paper)}
.clear{background:none;color:var(--over);border:1.5px solid var(--rule);flex:0 0 92px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="tool" id="mealsBtn">Meals</button>
    <button class="tool" id="goalsBtn">Goals</button>
  </header>

  <div class="mnav">
    <button id="prev" aria-label="Previous month">‹</button>
    <b id="mlabel"></b>
    <button id="next" aria-label="Next month">›</button>
  </div>

  <div class="dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
  <div class="grid" id="grid"></div>

  <div class="legend">
    <span><i style="background:var(--under)"></i>Under</span>
    <span><i style="background:var(--on)"></i>On target</span>
    <span><i style="background:var(--over)"></i>Over</span>
  </div>

  <div class="summary" id="summary"></div>
</div>

<div class="scrim" id="scrim"></div>

<!-- DAY SHEET -->
<div class="sheet" id="daySheet">
  <div class="grab"><div class="bar"></div></div>
  <h2 id="dTitle">—</h2>
  <div class="sub" id="dSub"></div>

  <div class="row">
    <label for="kcal">Calories</label>
    <input type="number" id="kcal" inputmode="decimal" step="any" min="0" placeholder="0">
    <span class="denom" id="kcalGoal"></span>
  </div>

  <button class="disc" id="disc">+ Macros</button>
  <div class="macros" id="macros">
    <div class="row">
      <label for="pro">Protein</label>
      <input type="number" id="pro" inputmode="decimal" step="any" min="0" placeholder="0">
      <span class="denom" id="proGoal"></span>
    </div>
    <div class="row">
      <label for="carb">Carbs</label>
      <input type="number" id="carb" inputmode="decimal" step="any" min="0" placeholder="0">
      <span class="denom" id="carbGoal"></span>
    </div>
    <div class="row">
      <label for="fat">Fat</label>
      <input type="number" id="fat" inputmode="decimal" step="any" min="0" placeholder="0">
      <span class="denom" id="fatGoal"></span>
    </div>
    <div class="row">
      <label for="sod">Sodium</label>
      <input type="number" id="sod" inputmode="decimal" step="any" min="0" placeholder="0">
      <span class="denom" id="sodGoal"></span>
    </div>
  </div>

  <div class="row water">
    <label for="water">Water</label>
    <button class="step" id="wDown" aria-label="Remove a cup">−</button>
    <input type="number" id="water" inputmode="decimal" step="any" min="0" placeholder="0">
    <button class="step" id="wUp" aria-label="Add a cup">+</button>
    <span class="denom" id="waterGoal"></span>
  </div>

  <div class="mealbar">
    <div id="mealChips"></div>
    <button class="addmeal" id="addMeal">＋ Add from meals</button>
  </div>

  <div class="exgroup">
    <button class="chip" data-ex="cardio">◇ Cardio</button>
    <button class="chip" data-ex="lift">▲ Lift</button>
  </div>

  <textarea id="note" placeholder="Notes for the day"></textarea>

  <div class="acts">
    <button class="btn clear" id="clearDay">Clear</button>
    <button class="btn save" id="saveDay">Save</button>
  </div>
</div>

<!-- GOALS SHEET -->
<div class="sheet" id="goalSheet">
  <div class="grab"><div class="bar"></div></div>
  <h2>Goals</h2>
  <div class="sub">Daily targets. Leave blank to hide.</div>

  <div class="row"><label for="gk">Calories</label><input type="number" id="gk" inputmode="decimal" step="any" min="0" placeholder="—"><span class="unit">kcal</span></div>
  <div class="row"><label for="gp">Protein</label><input type="number" id="gp" inputmode="decimal" step="any" min="0" placeholder="—"><span class="unit">g</span></div>
  <div class="row"><label for="gc">Carbs</label><input type="number" id="gc" inputmode="decimal" step="any" min="0" placeholder="—"><span class="unit">g</span></div>
  <div class="row"><label for="gf">Fat</label><input type="number" id="gf" inputmode="decimal" step="any" min="0" placeholder="—"><span class="unit">g</span></div>
  <div class="row"><label for="gs">Sodium</label><input type="number" id="gs" inputmode="decimal" step="any" min="0" placeholder="—"><span class="unit">mg</span></div>
  <div class="row"><label for="gw">Water</label><input type="number" id="gw" inputmode="decimal" step="any" min="0" placeholder="—"><span class="unit">cups</span></div>
  <div class="row"><label for="gt">On-target window</label><input type="number" id="gt" inputmode="numeric" step="1" min="0" placeholder="10"><span class="unit">%</span></div>

  <div class="acts"><button class="btn save" id="saveGoals" style="flex:1">Save goals</button></div>

  <div class="newlabel">Backup</div>
  <div class="backup">
    <button class="btn ghost" id="expBtn">Export</button>
    <button class="btn ghost" id="impBtn">Import</button>
  </div>
  <input type="file" id="impFile" accept=".json,application/json" hidden>
  <div class="bhint" id="bhint">Saves every day, meal, and goal to a file.</div>
</div>

<!-- MEAL INDEX SHEET -->
<div class="sheet" id="mealSheet">
  <div class="grab"><div class="bar"></div></div>
  <div class="mhead">
    <h2>Meals</h2>
    <button class="mdone" id="mDone">Done</button>
  </div>
  <div class="sub" id="mealSub"></div>

  <div id="mealList"></div>

  <div class="newlabel">New meal</div>
  <input type="text" id="mName" placeholder="Name" autocapitalize="words">
  <div class="row"><label for="mK">Calories</label><input type="number" id="mK" inputmode="decimal" step="any" min="0" placeholder="0"><span class="unit">kcal</span></div>
  <div class="row"><label for="mP">Protein</label><input type="number" id="mP" inputmode="decimal" step="any" min="0" placeholder="0"><span class="unit">g</span></div>
  <div class="row"><label for="mC">Carbs</label><input type="number" id="mC" inputmode="decimal" step="any" min="0" placeholder="0"><span class="unit">g</span></div>
  <div class="row"><label for="mF">Fat</label><input type="number" id="mF" inputmode="decimal" step="any" min="0" placeholder="0"><span class="unit">g</span></div>
  <div class="row"><label for="mS">Sodium</label><input type="number" id="mS" inputmode="decimal" step="any" min="0" placeholder="0"><span class="unit">mg</span></div>

  <div class="acts"><button class="btn save" id="mSave" style="flex:1">Save to meals</button></div>
</div>

<script>
const K='intake.days', G='intake.goals', M='intake.meals';
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let days=load(K,{}), goals=load(G,{kcal:2000,pro:150,carb:200,fat:65,sod:2300,water:8,tol:10}), meals=load(M,[]);
let view=new Date(), sel=null, pending=[], mealMode='add';

const key=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const $=id=>document.getElementById(id);

function status(rec){
  if(!rec||rec.kcal==null||rec.kcal===''||!goals.kcal) return null;
  const tol=(goals.tol||10)/100, r=rec.kcal/goals.kcal;
  if(r<1-tol) return 'under';
  if(r>1+tol) return 'over';
  return 'on';
}
const COLOR={under:'var(--under)',on:'var(--on)',over:'var(--over)'};

function render(){
  $('mlabel').textContent=`${MO[view.getMonth()]} ${view.getFullYear()}`;
  const g=$('grid'); g.innerHTML='';
  const first=new Date(view.getFullYear(),view.getMonth(),1);
  const total=new Date(view.getFullYear(),view.getMonth()+1,0).getDate();
  const tk=key(new Date());

  for(let i=0;i<first.getDay();i++){const b=document.createElement('div');b.className='cell blank';g.appendChild(b)}

  let logged=0,sum=0;
  for(let d=1;d<=total;d++){
    const date=new Date(view.getFullYear(),view.getMonth(),d), k=key(date);
    const rec=days[k], st=status(rec);
    const c=document.createElement('button');
    c.className='cell'+(k===tk?' today':'')+(st?' filled':'');
    if(st) c.style.background=COLOR[st];
    c.innerHTML=`<span>${d}</span>`;
    if(rec){
      if(rec.kcal!=null&&rec.kcal!=='') {logged++; sum+=+rec.kcal;}
      let m='';
      if(rec.cardio) m+='◇';
      if(rec.lift) m+='▲';
      if(m) c.innerHTML+=`<span class="marks">${m}</span>`;
      if(rec.note) c.innerHTML+='<span class="note"></span>';
    }
    c.onclick=()=>openDay(date);
    g.appendChild(c);
  }
  $('summary').textContent = logged
    ? `${logged} day${logged>1?'s':''} logged · avg ${Math.round(sum/logged)} kcal`
    : 'No days logged this month';
}

function openDay(date){
  sel=key(date);
  const r=days[sel]||{};
  $('dTitle').textContent=date.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
  const st=status(r);
  $('dSub').textContent = st ? {under:'Under target',on:'On target',over:'Over target'}[st] : 'Not logged';

  $('kcal').value=r.kcal??''; $('pro').value=r.pro??''; $('carb').value=r.carb??''; $('fat').value=r.fat??'';
  $('sod').value=r.sod??''; $('water').value=r.water??'';
  $('note').value=r.note||'';
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',!!r[c.dataset.ex]));

  const dn=(id,v,u)=> $(id).textContent = v ? `/ ${v}${u}` : '';
  dn('kcalGoal',goals.kcal,''); dn('proGoal',goals.pro,'g'); dn('carbGoal',goals.carb,'g');
  dn('fatGoal',goals.fat,'g'); dn('sodGoal',goals.sod,'mg'); dn('waterGoal',goals.water,'');

  const has = r.pro!=null||r.carb!=null||r.fat!=null||r.sod!=null;
  $('macros').classList.toggle('show',has);
  $('disc').textContent = has?'– Macros':'+ Macros';

  pending=(r.meals||[]).map(m=>({...m}));
  renderChips();

  show('daySheet');
}

/* ---- meals ---- */
function openMacros(){$('macros').classList.add('show');$('disc').textContent='– Macros'}

// Floats accumulate error: 0.1+0.2 = 0.30000000000000004. Round every
// arithmetic result so adding then removing a meal returns to exactly empty.
const r2=n=>Math.round((n+Number.EPSILON)*100)/100;

function bump(id,delta){
  if(!delta) return;
  const el=$(id), cur=el.value===''?0:+el.value;
  const v=Math.max(0,r2(cur+delta));
  el.value = (v===0&&delta<0) ? '' : v;
}
function applyMeal(m,sign){
  bump('kcal',sign*(m.kcal||0)); bump('pro',sign*(m.pro||0));
  bump('carb',sign*(m.carb||0)); bump('fat',sign*(m.fat||0)); bump('sod',sign*(m.sod||0));
}

function renderChips(){
  const w=$('mealChips'); w.innerHTML='';
  pending.forEach((m,i)=>{
    const c=document.createElement('button');
    c.className='mchip';
    c.innerHTML=`${esc(m.name)} <b>${m.kcal||0}</b> <span>×</span>`;
    c.title='Remove';
    c.onclick=()=>{applyMeal(m,-1);pending.splice(i,1);renderChips()};
    w.appendChild(c);
  });
}

function addFromIndex(m){
  const snap={name:m.name,kcal:m.kcal||0,pro:m.pro||0,carb:m.carb||0,fat:m.fat||0,sod:m.sod||0};
  pending.push(snap); applyMeal(snap,1);
  if(snap.pro||snap.carb||snap.fat||snap.sod) openMacros();
  renderChips(); closeMeals();
}

function macroLine(m){
  const p=[]; if(m.pro)p.push(m.pro+'P'); if(m.carb)p.push(m.carb+'C'); if(m.fat)p.push(m.fat+'F'); if(m.sod)p.push(m.sod+'mg');
  return `${m.kcal||0} kcal` + (p.length?` · ${p.join(' ')}`:'');
}

function renderIndex(){
  const w=$('mealList');
  if(!meals.length){w.innerHTML='<div class="empty">No meals saved yet.</div>';return}
  w.innerHTML='';
  const adding = mealMode==='add';
  meals.forEach((m,i)=>{
    const row=document.createElement('div'); row.className='mrow';
    const main=document.createElement(adding?'button':'div');
    main.className='madd'+(adding?'':' static');
    main.innerHTML=`<span class="mn">${esc(m.name)}</span><span class="mk">${macroLine(m)}</span>`;
    if(adding) main.onclick=()=>addFromIndex(m);
    const del=document.createElement('button'); del.className='mdel'; del.textContent='×';
    del.setAttribute('aria-label','Delete meal');
    del.onclick=()=>{ if(confirm(`Delete "${m.name}" from your meals?`)){meals.splice(i,1);save(M,meals);renderIndex()} };
    row.append(main,del); w.appendChild(row);
  });
}

function openMeals(mode){
  mealMode=mode;
  $('mealSub').textContent = mode==='add'
    ? 'Tap a meal to add it to the day.'
    : 'Your saved meals.';
  renderIndex();
  show('mealSheet');
}

function closeMeals(){
  $('mealSheet').classList.remove('open');
  if(!$('daySheet').classList.contains('open')) $('scrim').classList.remove('open');
}

$('mealsBtn').onclick=()=>openMeals('manage');
$('addMeal').onclick=()=>openMeals('add');
$('mDone').onclick=closeMeals;

$('mSave').onclick=()=>{
  const name=$('mName').value.trim();
  if(!name){$('mName').focus();return}
  const mv=id=>{const n=+$(id).value; return isFinite(n)?r2(n):0;};
  meals.push({name,kcal:mv('mK'),pro:mv('mP'),carb:mv('mC'),fat:mv('mF'),sod:mv('mS')});
  meals.sort((a,b)=>a.name.localeCompare(b.name));
  save(M,meals);
  ['mName','mK','mP','mC','mF','mS'].forEach(id=>$(id).value='');
  renderIndex();
  $('mealSheet').scrollTo({top:0,behavior:'smooth'});
};

function show(id){$('scrim').classList.add('open');$(id).classList.add('open')}
function hide(){$('scrim').classList.remove('open');document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('open'))}
$('scrim').onclick=()=>{
  if($('mealSheet').classList.contains('open')) closeMeals(); else hide();
};

$('disc').onclick=()=>{
  const m=$('macros'); m.classList.toggle('show');
  $('disc').textContent = m.classList.contains('show')?'– Macros':'+ Macros';
};
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>c.classList.toggle('on'));

const num=v=>{ if(v==='') return null; const n=+v; return isFinite(n)?Math.max(0,r2(n)):null; };
$('saveDay').onclick=()=>{
  const rec={
    kcal:num($('kcal').value), pro:num($('pro').value),
    carb:num($('carb').value), fat:num($('fat').value),
    sod:num($('sod').value), water:num($('water').value),
    note:$('note').value.trim()||null,
    cardio:document.querySelector('[data-ex=cardio]').classList.contains('on'),
    lift:document.querySelector('[data-ex=lift]').classList.contains('on'),
    meals:pending.length?pending:null
  };
  const empty=rec.kcal==null&&rec.pro==null&&rec.carb==null&&rec.fat==null&&rec.sod==null&&rec.water==null&&!rec.note&&!rec.cardio&&!rec.lift&&!rec.meals;
  if(empty) delete days[sel]; else days[sel]=rec;
  save(K,days); hide(); render();
};
$('clearDay').onclick=()=>{delete days[sel];pending=[];save(K,days);hide();render()};

$('goalsBtn').onclick=()=>{
  $('gk').value=goals.kcal??''; $('gp').value=goals.pro??'';
  $('gc').value=goals.carb??''; $('gf').value=goals.fat??'';
  $('gs').value=goals.sod??''; $('gw').value=goals.water??''; $('gt').value=goals.tol??10;
  hint(DEFAULT_HINT);
  show('goalSheet');
};
$('saveGoals').onclick=()=>{
  goals={kcal:num($('gk').value),pro:num($('gp').value),carb:num($('gc').value),
         fat:num($('gf').value),sod:num($('gs').value),water:num($('gw').value),
         tol:num($('gt').value)||10};
  save(G,goals); hide(); render();
};

$('wUp').onclick=()=>bump('water',1);
$('wDown').onclick=()=>bump('water',-1);

/* ---- backup ---- */
const hint=(msg,cls='')=>{const b=$('bhint');b.textContent=msg;b.className='bhint '+cls};
const DEFAULT_HINT='Saves every day, meal, and goal to a file.';

$('expBtn').onclick=()=>{
  const payload={
    format:'intake-backup', version:1,
    exported:new Date().toISOString(),
    days, goals, meals
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`calories-${key(new Date())}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  const n=Object.keys(days).length;
  hint(`Exported ${n} day${n===1?'':'s'} and ${meals.length} meal${meals.length===1?'':'s'}.`,'ok');
};

$('impBtn').onclick=()=>$('impFile').click();

$('impFile').onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onerror=()=>hint('Could not read that file.','err');
  r.onload=()=>{
    let d;
    try{ d=JSON.parse(r.result); }
    catch{ return hint('That file is not valid JSON.','err'); }

    if(!d||typeof d!=='object'||d.format!=='intake-backup')
      return hint('That does not look like a backup from this app.','err');
    if(typeof d.days!=='object'||d.days===null||Array.isArray(d.days))
      return hint('Backup is missing its days.','err');
    if(!Array.isArray(d.meals))
      return hint('Backup is missing its meals.','err');

    const nd=Object.keys(d.days).length;
    const cur=Object.keys(days).length;
    const warn = cur
      ? `Replace your current ${cur} logged day${cur===1?'':'s'} with ${nd} from this backup? This cannot be undone.`
      : `Import ${nd} day${nd===1?'':'s'} and ${d.meals.length} meal${d.meals.length===1?'':'s'}?`;
    if(!confirm(warn)){ hint(DEFAULT_HINT); e.target.value=''; return; }

    days=d.days; meals=d.meals;
    if(d.goals&&typeof d.goals==='object') goals=d.goals;
    save(K,days); save(M,meals); save(G,goals);
    render();
    hint(`Imported ${nd} day${nd===1?'':'s'}.`,'ok');
    e.target.value='';
  };
  r.readAsText(f);
};

/* ---- drag to dismiss ---- */
// Dismissing the day sheet commits the entry; a gesture must never silently
// discard what was typed. The meal and goal sheets have nothing pending.
const dismiss={
  daySheet:  ()=>$('saveDay').onclick(),
  mealSheet: ()=>closeMeals(),
  goalSheet: ()=>hide()
};

document.querySelectorAll('.sheet').forEach(sheet=>{
  const grab=sheet.querySelector('.grab');
  let id=null, y0=0, dy=0, lastY=0, lastT=0, vel=0;

  grab.addEventListener('pointerdown',e=>{
    if(id!==null) return;
    id=e.pointerId; y0=lastY=e.clientY; lastT=e.timeStamp; dy=0; vel=0;
    grab.setPointerCapture(id);
    sheet.classList.add('dragging');
    // only fade the scrim if nothing sits beneath this sheet
    if(!(sheet.id==='mealSheet' && $('daySheet').classList.contains('open')))
      $('scrim').classList.add('dragging');
  });

  grab.addEventListener('pointermove',e=>{
    if(e.pointerId!==id) return;
    dy=e.clientY-y0;
    if(dy<0) dy=-Math.pow(-dy,.55);           // rubber-band upward
    const dt=e.timeStamp-lastT;
    if(dt>0) vel=(e.clientY-lastY)/dt;        // px per ms
    lastY=e.clientY; lastT=e.timeStamp;

    sheet.style.transform=`translateY(${dy}px)`;
    if($('scrim').classList.contains('dragging')){
      const h=sheet.offsetHeight||1;
      $('scrim').style.opacity=String(Math.max(0,1-Math.max(0,dy)/h));
    }
  });

  const release=e=>{
    if(e.pointerId!==id) return;
    id=null;
    sheet.classList.remove('dragging');
    $('scrim').classList.remove('dragging');
    sheet.style.transform='';
    $('scrim').style.opacity='';

    const far  = dy > sheet.offsetHeight*0.28;   // dragged far enough
    const flick= vel > 0.6 && dy > 40;           // or thrown downward
    if(far||flick) dismiss[sheet.id]();
    dy=0; vel=0;
  };
  grab.addEventListener('pointerup',release);
  grab.addEventListener('pointercancel',release);
});

$('prev').onclick=()=>{view.setMonth(view.getMonth()-1);render()};
$('next').onclick=()=>{view.setMonth(view.getMonth()+1);render()};
render();
</script>
